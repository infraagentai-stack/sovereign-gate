<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Agentic AI | Sovereign Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    <header class="max-w-2xl w-full text-center py-12">
        <h1 class="text-4xl font-bold tracking-tight text-white mb-4">MASTER AGENTIC AI</h1>
        <p class="text-slate-400 text-lg">Sovereign AI Infrastructure & 2048-bit Hardened Solutions.</p>
    </header>

    <main class="max-w-xl w-full space-y-8">
        <div class="glass p-8 rounded-2xl">
            <h2 class="text-2xl font-semibold mb-2">The Sovereign Blueprint</h2>
            <p class="text-slate-400 mb-6 text-sm">Full n8n logic, Cloudflare hardening templates, and global export compliance docs.</p>
            <a href="YOUR_DODO_LINK_HERE" class="block w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-center transition">Purchase Blueprint</a>
        </div>

        <div class="glass p-8 rounded-2xl">
            <h2 class="text-2xl font-semibold mb-4">Mission Request</h2>
            <form action="YOUR_N8N_WEBHOOK_URL" method="POST" class="space-y-4 text-sm">
                <input type="text" name="name" placeholder="Name/Entity" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-blue-500" required>
                <input type="email" name="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-blue-500" required>
                <select name="budget" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none">
                    <option>$1,250 - $3,500</option>
                    <option>$3,500 - $10,000</option>
                    <option>$10k+</option>
                </select>
                <textarea name="message" placeholder="Describe your Infrastructure Pain..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg h-32 focus:outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="w-full bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-slate-200 transition">Verify & Send</button>
            </form>
        </div>
    </main>

    <footer class="mt-auto py-8 text-slate-500 text-xs uppercase tracking-widest">
        Udyam Certified | IEC Authorized | 2048-bit RSA
    </footer>
</body>
</html>
